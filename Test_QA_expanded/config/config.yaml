testing:
  sampling:
    measurements_count: NULL
    total_duration_seconds: 5
    sampling_frequency_hz: 30

ammeters:
  greenlee:
    class: GreenleeAmmeter
    module: Ammeters.Greenlee_Ammeter
    port: 5000
    command: "MEASURE_GREENLEE -get_measurement"
  entes:
    class: EntesAmmeter
    module: Ammeters.Entes_Ammeter
    port: 5001
    command: "MEASURE_ENTES -get_data"
  circutor:
    class: CircutorAmmeter
    module: Ammeters.Circutor_Ammeter
    port: 5002
    command: "MEASURE_CIRCUTOR -get_measurement"

analysis:
  statistical_metrics:
    - mean
    - median
    - standard_deviation
    - minimum
    - maximum
  visualization:
    enabled: true
    plot_types:

result_management:
  output_dir: "results"